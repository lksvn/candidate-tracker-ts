services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: candidate_tracker
      POSTGRES_PASSWORD: candidate_tracker_dev
      POSTGRES_DB: candidate_tracker
    ports:
      - "5432:5432"
    volumes:
      - candidate_tracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U candidate_tracker -d candidate_tracker
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  candidate_tracker_postgres_data: